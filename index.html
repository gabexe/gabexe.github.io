<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impostor</title>
    <!-- Incluyendo Tailwind CSS para un diseño rápido y responsivo -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Estilos base para el cuerpo y el canvas */
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Inter', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        canvas {
            position: fixed; /* Asegura que el canvas cubra todo el fondo */
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1; /* Coloca el canvas detrás del contenido */
        }
    </style>
</head>
<body>
    <canvas id="starCanvas"></canvas>

    <!-- Contenedor principal del juego -->
    <div id="game-container" class="w-full max-w-2xl p-6 md:p-10 rounded-3xl shadow-lg transition-all duration-500 ease-in-out" style="background-color: rgba(21, 21, 21, 0.8);">
        
        <!-- Pantalla de inicio (Home) -->
        <div id="home-screen" class="text-center transition-opacity duration-500 ease-in-out">
            <h1 class="text-4xl md:text-6xl font-bold mb-4">Impostor</h1>
            <p class="text-gray-400 mb-8 md:text-lg">Descubre al impostor antes de que sea tarde.</p>
            <div class="flex flex-col md:flex-row space-y-4 md:space-y-0 md:space-x-4 justify-center">
                <button id="start-button-home" class="btn-monochrome px-8 py-4 rounded-full text-lg font-bold">Iniciar Juego</button>
                <button id="options-button-home" class="btn-monochrome px-8 py-4 rounded-full text-lg font-bold">Opciones</button>
            </div>
        </div>

        <!-- Pantalla de Opciones -->
        <div id="options-screen" class="text-center hidden transition-opacity duration-500 ease-in-out">
            <h2 class="text-3xl md:text-4xl font-bold mb-6">Opciones</h2>
            <div class="space-y-6 mb-8">
                
                <!-- Jugadores e Impostores -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="player-count" class="block text-sm font-medium text-gray-300 mb-2">Número de jugadores</label>
                        <input type="number" id="player-count" value="4" min="4" max="10" class="input-monochrome w-full p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-gray-500 text-center">
                    </div>
                    <div>
                        <label for="impostor-count" class="block text-sm font-medium text-gray-300 mb-2">Número de impostores</label>
                        <input type="number" id="impostor-count" value="1" min="1" max="3" class="input-monochrome w-full p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-gray-500 text-center">
                    </div>
                </div>

                <!-- Checkbox Mostrar Categoría -->
                <div class="flex items-center justify-center space-x-2 pt-2">
                    <input type="checkbox" id="show-impostor-category" class="form-checkbox h-5 w-5 text-gray-600" checked>
                    <label for="show-impostor-category" class="text-sm font-medium text-gray-300">Mostrar categoría al impostor</label>
                </div>

                <!-- Categorías -->
                <div>
                    <label for="category-search" class="block text-sm font-medium text-gray-300 mb-2">Categorías</label>
                    <input type="text" id="category-search" placeholder="Buscar categorías..." class="input-monochrome w-full md:w-3/4 mx-auto p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-gray-500 text-center">
                    <div id="category-list" class="mt-4 max-h-40 overflow-y-auto space-y-2 text-left mx-auto max-w-sm p-3 rounded-lg bg-gray-800/50">
                        <!-- Las categorías se insertarán aquí dinámicamente -->
                    </div>
                </div>

            </div>
            <button id="back-button-options" class="btn-monochrome px-8 py-4 rounded-full text-lg font-bold">Volver</button>
            <p id="error-message" class="text-red-500 mt-4 text-sm font-semibold hidden"></p>
        </div>

        <!-- Pantalla de juego -->
        <div id="game-screen" class="text-center hidden transition-opacity duration-500 ease-in-out">
            <p id="player-turn-text" class="text-gray-400 mb-4 text-sm md:text-base"></p>
            <div id="card-container" class="card-container w-full max-w-sm mx-auto">
                <div id="game-card" class="card">
                    <div class="card-face card-front border-gray-500">
                        <h3 class="text-2xl md:text-3xl font-bold">Toca para revelar</h3>
                    </div>
                    <div class="card-face card-back">
                        <!-- Contenido dinámico del rol y la palabra -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Pantalla de fin de juego -->
        <div id="end-screen" class="text-center hidden transition-opacity duration-500 ease-in-out">
            <h2 class="text-3xl md:text-4xl font-bold mb-6">Juego Finalizado</h2>
            <p id="final-message" class="text-gray-300 text-lg mb-6">¡Discutan quiénes son los impostores!</p>
            <button id="play-again-button" class="btn-monochrome px-6 py-3 rounded-full text-md font-bold">Revelar Palabra</button>
        </div>

        <!-- Mensaje emergente para notificaciones (aún necesario para validaciones) -->
        <div id="message-box" class="fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-gray-900 text-white p-6 rounded-2xl shadow-lg border border-gray-500 hidden z-50">
            <p id="message-text" class="text-lg font-semibold mb-4 text-center"></p>
            <button id="close-message" class="btn-monochrome w-full py-2 rounded-full font-bold">OK</button>
        </div>
    </div>

    <script src="js/database.js"></script>
    <script src="js/main.js"></script>
    <script>
        window.onload = function() {
            // Objeto de configuración para las estrellas
            const starConfig = {
                numberOfStars: 500,
                minRadius: 1,
                maxRadius: 1.5,
                minOpacity: 0.1,
                maxOpacity: 0.9,
                minSpeed: 0.0006,
                maxSpeed: 0.01
            };

            const canvas = document.getElementById('starCanvas');
            const ctx = canvas.getContext('2d');

            let width = window.innerWidth;
            let height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;

            // Clase para las estrellas
            class Star {
                constructor(x, y, radius, opacity) {
                    this.x = x;
                    this.y = y;
                    this.radius = radius;
                    this.opacity = opacity;
                    this.direction = 1;
                    this.speed = Math.random() * (starConfig.maxSpeed - starConfig.minSpeed) + starConfig.minSpeed;
                }

                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);
                    ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                    ctx.fill();
                }

                update() {
                    this.opacity += this.direction * this.speed;

                    if (this.opacity >= starConfig.maxOpacity || this.opacity <= starConfig.minOpacity) {
                        this.direction *= -1;
                    }
                }
            }

            const stars = [];

            function createStars() {
                stars.length = 0;
                for (let i = 0; i < starConfig.numberOfStars; i++) {
                    const x = Math.random() * width;
                    const y = Math.random() * height;
                    const radius = Math.random() * (starConfig.maxRadius - starConfig.minRadius) + starConfig.minRadius;
                    const opacity = Math.random() * (starConfig.maxOpacity - starConfig.minOpacity) + starConfig.minOpacity;
                    stars.push(new Star(x, y, radius, opacity));
                }
            }

            createStars();

            function animate() {
                // Limpia el canvas
                ctx.clearRect(0, 0, width, height);

                // Actualiza y dibuja las estrellas
                stars.forEach(star => {
                    star.update();
                    star.draw();
                });

                requestAnimationFrame(animate);
            }

            window.addEventListener('resize', () => {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                createStars();
            });

            if (canvas) {
                animate();
            }
        };

    </script>
</body>
</html>
